query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            precoAtacado: metafield(namespace: "custom", key: "preco_atacado") {
              value
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}
